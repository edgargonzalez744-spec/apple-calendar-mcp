# One-click-ish deploy to Render (https://render.com). Free tier works.
# After deploy, your connector URL is:  https://<service-name>.onrender.com/mcp
services:
  - type: web
    name: apple-calendar-mcp
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      # Set these in the Render dashboard (mark them Secret), NOT here:
      - key: ICLOUD_USERNAME
        sync: false
      - key: ICLOUD_APP_PASSWORD
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
      - key: CALDAV_DEFAULT_TZ
        value: America/New_York
